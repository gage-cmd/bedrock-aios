name: CI
on: [push, pull_request]
jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install
      - run: cd backend && pnpm lint
      - run: cd apps/dashboard && pnpm lint
      - run: ./check-branding.sh
